<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- 淡紫天空蓝渐变 - 柔和优雅 -->
    <linearGradient id="softGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#DDD6FE;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#BAE6FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7DD3FC;stop-opacity:1" />
    </linearGradient>
    
    <!-- 柔和阴影 -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="2" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆形 - 淡紫天空蓝渐变 -->
  <circle cx="50" cy="50" r="46" fill="url(#softGradient)" filter="url(#softShadow)"/>
  
  <!-- 内圈装饰 -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  
  <!-- 中心聚合图形 - 白色 -->
  <g fill="white" opacity="0.95">
    <!-- 顶部节点 -->
    <circle cx="50" cy="28" r="5"/>
    
    <!-- 左下节点 -->
    <circle cx="32" cy="65" r="5"/>
    
    <!-- 右下节点 -->
    <circle cx="68" cy="65" r="5"/>
    
    <!-- 连接线形成 A 字形 -->
    <path d="M50 28 L32 65" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M50 28 L68 65" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M38 50 L62 50" stroke="white" stroke-width="4" stroke-linecap="round"/>
    
    <!-- 中心核心节点 -->
    <circle cx="50" cy="50" r="7" fill="white"/>
    <circle cx="50" cy="50" r="3" fill="url(#softGradient)"/>
  </g>
  
  <!-- 外围装饰小点 -->
  <circle cx="20" cy="50" r="2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="80" cy="50" r="2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="50" cy="15" r="2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="50" cy="85" r="2" fill="rgba(255,255,255,0.6)"/>
</svg>
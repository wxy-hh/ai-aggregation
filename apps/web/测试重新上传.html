<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试文件输入框点击</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
        background: #f5f5f5;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #333;
        margin-bottom: 20px;
      }
      .test-section {
        margin: 20px 0;
        padding: 20px;
        background: #f9f9f9;
        border-radius: 8px;
      }
      button {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s;
      }
      button:hover {
        background: #2563eb;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      }
      button:active {
        transform: translateY(0);
      }
      .log {
        margin-top: 15px;
        padding: 15px;
        background: #1e293b;
        color: #e2e8f0;
        border-radius: 6px;
        font-family: 'Monaco', 'Courier New', monospace;
        font-size: 12px;
        max-height: 300px;
        overflow-y: auto;
      }
      .log-entry {
        margin: 5px 0;
        padding: 5px;
        border-left: 3px solid #3b82f6;
        padding-left: 10px;
      }
      .log-entry.success {
        border-left-color: #10b981;
        color: #6ee7b7;
      }
      .log-entry.error {
        border-left-color: #ef4444;
        color: #fca5a5;
      }
      .hidden-input {
        display: none;
      }
      .info {
        background: #dbeafe;
        border-left: 4px solid #3b82f6;
        padding: 12px;
        margin: 15px 0;
        border-radius: 4px;
        color: #1e40af;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🧪 文件输入框点击测试</h1>

      <div class="info">
        <strong>测试目的：</strong>验证通过 JavaScript 触发隐藏的文件输入框是否能正常弹出文件选择器
      </div>

      <!-- 测试 1：直接点击 -->
      <div class="test-section">
        <h2>测试 1：直接点击按钮触发</h2>
        <p>点击下面的按钮，应该立即弹出文件选择器</p>
        <button onclick="test1()">点击触发文件选择器</button>
        <input
          type="file"
          id="fileInput1"
          class="hidden-input"
          accept=".mp3,.wav,.aac"
          onchange="handleFileChange(1, this)"
        />
      </div>

      <!-- 测试 2：使用 ref 触发 -->
      <div class="test-section">
        <h2>测试 2：使用 ref 触发（模拟 React）</h2>
        <p>模拟 React 的 useRef 方式触发</p>
        <button onclick="test2()">使用 ref 触发</button>
        <input
          type="file"
          id="fileInput2"
          class="hidden-input"
          accept=".mp3,.wav,.aac"
          onchange="handleFileChange(2, this)"
        />
      </div>

      <!-- 测试 3：延迟触发 -->
      <div class="test-section">
        <h2>测试 3：延迟触发（模拟异步）</h2>
        <p>使用 setTimeout 延迟触发，模拟异步场景</p>
        <button onclick="test3()">延迟触发</button>
        <input
          type="file"
          id="fileInput3"
          class="hidden-input"
          accept=".mp3,.wav,.aac"
          onchange="handleFileChange(3, this)"
        />
      </div>

      <!-- 日志输出 -->
      <div class="log" id="log">
        <div class="log-entry">等待测试...</div>
      </div>
    </div>

    <script>
      const logContainer = document.getElementById('log');

      function log(message, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        logContainer.appendChild(entry);
        logContainer.scrollTop = logContainer.scrollHeight;
      }

      function handleFileChange(testNum, input) {
        if (input.files.length > 0) {
          log(`✓ 测试 ${testNum} 成功：选择了文件 "${input.files[0].name}"`, 'success');
        } else {
          log(`✗ 测试 ${testNum} 失败：未选择文件`, 'error');
        }
      }

      // 测试 1：直接触发
      function test1() {
        log('开始测试 1：直接点击触发');
        const input = document.getElementById('fileInput1');
        log(`  - 获取 input 元素: ${input ? '成功' : '失败'}`);

        if (input) {
          log('  - 调用 input.click()');
          input.click();
          log('  - click() 调用完成，等待用户选择文件...');
        } else {
          log('  - 错误：无法找到 input 元素', 'error');
        }
      }

      // 测试 2：使用 ref（模拟 React）
      function test2() {
        log('开始测试 2：使用 ref 触发（模拟 React）');

        // 模拟 React 的 useRef
        const fileInputRef = {
          current: document.getElementById('fileInput2'),
        };

        log(`  - fileInputRef.current: ${fileInputRef.current ? '存在' : 'null'}`);

        if (fileInputRef.current) {
          log('  - 调用 fileInputRef.current.click()');
          fileInputRef.current.click();
          log('  - click() 调用完成，等待用户选择文件...');
        } else {
          log('  - 错误：fileInputRef.current 为 null', 'error');
        }
      }

      // 测试 3：延迟触发（模拟异步）
      function test3() {
        log('开始测试 3：延迟触发（模拟异步）');
        const input = document.getElementById('fileInput3');
        log(`  - 获取 input 元素: ${input ? '成功' : '失败'}`);

        log('  - 使用 setTimeout 延迟 100ms');
        setTimeout(() => {
          log('  - setTimeout 回调执行');
          if (input) {
            log('  - 调用 input.click()');
            input.click();
            log('  - click() 调用完成，等待用户选择文件...');
          } else {
            log('  - 错误：无法找到 input 元素', 'error');
          }
        }, 100);
      }

      // 页面加载完成
      window.addEventListener('DOMContentLoaded', () => {
        log('页面加载完成，准备测试', 'success');
        log('请依次点击上面的测试按钮');
      });
    </script>
  </body>
</html>
